<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Why You're My Best Friend! 💖</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <link rel="stylesheet" href="./cause.css">
    <style>
        /* Music player styling */
        #bgMusic {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 1000;
            width: 200px;
            opacity: 0.8;
        }
        .volume-btn {
            position: fixed;
            top: 25px;
            right: 25px;
            background: linear-gradient(45deg, #ff69b4, #ff1493);
            color: white;
            border: none;
            padding: 12px 16px;
            border-radius: 50px;
            cursor: pointer;
            font-size: 14px;
            box-shadow: 0 4px 15px rgba(255,105,180,0.4);
            z-index: 1001;
            transition: all 0.3s ease;
        }
        .volume-btn:hover {
            transform: scale(1.1);
            box-shadow: 0 6px 20px rgbaa(255,105,180,0.6);
        }
    </style>
</head>
<body>
    <div class="custom-cursor">
        <svg viewBox="0 0 24 24">
            <path fill="#ff69b4" d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/>
        </svg>
    </div>

    <!-- BACKGROUND MUSIC PLAYER -->
    <audio id="bgMusic" loop preload="auto">
        <source src="./song.mp3" type="audio/mpeg">
        Your browser does not support audio.
    </audio>

    <div class="container">
        <h1>Happy Birthday Krish 💖</h1>
        
        <div id="reasons-container"></div>
        
        <button class="shuffle-button">Click Here... 💕</button>
        <div class="reason-counter"></div>

        <div class="ending-section">
            <div class="teddy-hug">
                <img src="./d1.jpg" alt="Teddy Hug">
            </div>
            <div class="ending-text">You're the BESTEST ! 💖</div>
        </div>
    </div>

    <!-- Volume Control Button -->
    <button class="volume-btn" id="volumeBtn" hidden>🔊 Play Music</button>

    <script src="cause.js"></script>
</body>
</html>
